<body>
<div class="container-fluid w-50 border rounded-5 shadow-lg bg-light mb-3 mt-3">

<form action="Signup" method = "post" onsubmit="return handleSubmit()" class="form mt-1 mb-3 w-100 p-3" >
<h1 class="h1 mb-3 text-primary text-center">Sign Up here</h1>
<label class="form-label mt-3 mb-3">Name : </label>
<input type="text" name="username" id="username" class="form-control mb-3">
<label class="form-label mt-3 mb-3">Email : </label>
<input type="text" name="email" id="email" class="form-control mb-3">
<label class="form-label mt-3 mb-3">Password: </label>
<input type="text" name="password" id="password" class="form-control mb-3">
<label class="form-label mt-3 mb-3">Confirm Password: </label>
<input type="text" name="cpassword" id ="cpassword" class="form-control mb-3">
<button class="btn btn-success hover w-100">SignUp</button>
<p id="formValidationResult" class="text-danger fw-bold mt-3 mb-3"></p>
<a href="./index.html">Already have an account? Login Here</a>

</form>
